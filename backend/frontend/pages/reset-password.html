<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir Senha • Diário de Bordo Emocional</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <h1 class="title">Redefinir senha</h1>
      <p class="subtitle">Crie uma nova senha para sua conta</p>

      <form id="resetForm" novalidate>
        <label class="field">
          <span>Nova senha</span>
          <input id="novaSenha" type="password" placeholder="Digite sua nova senha" required />
        </label>

        <label class="field">
          <span>Confirmar nova senha</span>
          <input id="confirmarNovaSenha" type="password" placeholder="Repita a nova senha" required />
        </label>

        <div class="actions">
          <button id="btnResetarSenha" type="submit" class="btn btn-primary">Salvar nova senha</button>
          <a href="/login" class="btn btn-secondary" style="text-decoration:none;">Voltar ao login</a>
        </div>

        <p id="resetStatus" class="status" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="/js/reset-password.js"></script>
</body>
</html>
